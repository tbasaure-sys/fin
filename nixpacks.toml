[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "pip3.11 install -r requirements.txt --target /app/site-packages"
]

[phases.build]
cmds = []

[variables]
PYTHONPATH = "/app/site-packages:/app/src"

[start]
cmd = "python3.11 -m gunicorn 'meta_alpha_allocator.dashboard.wsgi:create_app()' --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:${PORT:-8000} --preload --log-level info"
