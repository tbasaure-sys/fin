# nixpacks.toml — Railway build configuration
#
# We only need to declare the Python version here.
# Nixpacks handles the virtualenv creation and `pip install -r requirements.txt`
# automatically — do NOT add a custom [phases.install] with pip commands, as
# that would try to install into the immutable /nix/store and fail.
#
# Python 3.11 required: datetime.UTC was added in 3.11; 3.10 will crash on boot.

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
