# nixpacks.toml — Railway build configuration
# Forces Python 3.11 to ensure datetime.UTC is available (added in 3.11).
# Without this, Railway may pick Python 3.10 and the server will crash.

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python -m gunicorn 'meta_alpha_allocator.dashboard.wsgi:create_app()' --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:${PORT:-8000} --preload --log-level info"
